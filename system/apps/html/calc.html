    <div class="window hidden" id="win_calc">
        <div class="grab">
            <span class="grab-title">🧮  Calculadora</span>
            <button class="grab-btn" id="btn_calc">X</button>
        </div>
        <div class="win_content content_calc">
            <input type="text" id="calcdisplay" disabled>
            <div id="calcbuttons">
                <button class="calcbutton" onclick="calcinnum('Percent')">%</button>
                <button class="calcbutton" onclick="calcinnum('Clear')">CE</button>
                <button class="calcbutton" onclick="calcinnum('Del')">⌫</button>
                <button class="calcbutton" onclick="calcinnum('/')">÷</button>

                
                <button class="calcbutton" onclick="calcinnum('1')">1</button>
                <button class="calcbutton" onclick="calcinnum('2')">2</button>
                <button class="calcbutton" onclick="calcinnum('3')">3</button>
                <button class="calcbutton" onclick="calcinnum('*')">×</button>

                <button class="calcbutton" onclick="calcinnum('4')">4</button>
                <button class="calcbutton" onclick="calcinnum('5')">5</button>
                <button class="calcbutton" onclick="calcinnum('6')">6</button>
                <button class="calcbutton" onclick="calcinnum('-')">-</button>

                <button class="calcbutton" onclick="calcinnum('7')">7</button>
                <button class="calcbutton" onclick="calcinnum('8')">8</button>
                <button class="calcbutton" onclick="calcinnum('9')">9</button>
                <button class="calcbutton" onclick="calcinnum('+')">+</button>

                <button class="calcbutton" onclick="calcinnum('0')">0</button>
                <button class="calcbutton" onclick="calcinnum('.')">.</button>
                <button class="calcbutton" onclick="calcinnum('00')">00</button>
                <button class="calcbutton" onclick="calcinnum('=')">=</button>
            </div>
        </div>
        <div class="resize-handle"></div>
    </div>
