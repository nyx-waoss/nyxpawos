<nyx-window app="files" win-title="📁  Archivos" title-i18n="wintitl_files">
    <div id="toolbar">
        <button onclick="files_goup()">←</button>
        <button onclick="files_reload()">↻</button>
        <div id="verticaldivisor"></div>
        <button onclick="filesCreateNewFileType()">+</button>
        <button onclick="files_delobj()">🗑</button>
        <button onclick="files_modobj()">✎</button>
        <input type="text" autocomplete="off" id="files_toolbar_dirinput">
    </div>
    <div id="files_main_workspace">
        <div id="files_recomended_dirs">
            <button class="files-recdir-button" onclick="setDirectory('/system/styledui/fileshome')" data-i18n="files_home">🏠 Inicio</button>
            <div style="width: 100%; height: 1px; background-color: rgba(255, 255, 255, 0.5);"></div>
            <button class="files-recdir-button" onclick="setDirectory(`/home/${SysVar.currentuser.user}/videos`)" data-i18n="files_videos">🎬 Videos</button>
            <button class="files-recdir-button" onclick="setDirectory(`/home/${SysVar.currentuser.user}/images`)" data-i18n="files_images">🖼️ Imagenes</button>
            <button class="files-recdir-button" onclick="setDirectory(`/home/${SysVar.currentuser.user}/documents`)" data-i18n="files_documents">📄 Documentos</button>
            <button class="files-recdir-button" onclick="setDirectory(`/home/${SysVar.currentuser.user}/downloads`)" data-i18n="files_downloads">⬇️ Descargas</button>
            <div style="width: 100%; height: 1px; background-color: rgba(255, 255, 255, 0.5);"></div>
            <button class="files-recdir-button" onclick="setDirectory('/')" data-i18n="files_thispc">🖥️ Esta PC</button>
            <button class="files-recdir-button hidden" onclick="setDirectory('/system/mnt/disk1')" data-i18n="files_usb">💾 USB</button>
            <div style="width: 100%; height: 1px; background-color: rgba(255, 255, 255, 0.5);"></div>
            <button class="files-recdir-button" onclick="setDirectory('/system/trash')" data-i18n="files_trash">🗑️ Basurero</button>
        </div>
        <div id="file-list"></div>
    </div>
    <div id="savefilebar" class="hidden">
        <input type="text" autocomplete="off" id="files_savefilebar_filename">
        <button onclick="files_cancelsave()" class="savefilebar_btn" data-i18n="files_cancel">Cancelar</button>
        <button onclick="files_execsave()" class="savefilebar_btn" id="savefilebar_savebtn" data-i18n="files_save">Guardar</button>
    </div>
</nyx-window>
