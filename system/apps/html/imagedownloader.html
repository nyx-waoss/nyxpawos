<!-- Template - _appname deben ser iguales-->

<div class="window hidden" id="win_imagedownloader">
    <div class="grab">
        <span class="grab-title">⬇️  Image Downloader</span>
        <button class="grab-btn" id="btn_imagedownloader">X</button>
    </div>
    <div class="win_content content_imagedownloader">
        
        <input type="text" placeholder="URL de la imagen" id="imagedownloader_input">
        <img id="imagedownloader_img" alt="Imagen">
        <button id="imagedownloader_btn">Descargar</button>

    </div>
    <div class="resize-handle"></div>
</div>
