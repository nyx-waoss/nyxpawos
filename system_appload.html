<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: rgb(105, 142, 215);
        }
        #icon {
            max-width: 80%;
            max-height: 80vh;
        }
        .hidden {
            display: none !important;
        }
        #notaviliablep {
            font-family: sans-serif;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <img id="icon" src="" alt="Loading...">
    <p class="hidden" id="notaviliablep">App not avilable, please report this error to InstictOS Service.</p>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imgURL = urlParams.get('img');
        const avilable = urlParams.get('avl');

        if (imgURL) {
            document.getElementById('icon').src = imgURL;
        } else {
            document.getElementById('icon').src = 'assets/loading.gif';
        }

        if (avilable === '0') {
            document.getElementById('notaviliablep').classList.remove('hidden');
        } else {
            document.getElementById('notaviliablep').classList.add('hidden');
        }
    </script>
</body>
</html>
